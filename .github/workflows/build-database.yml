name: Build Database

on:
  schedule:
    # Every Sunday at 03:15 UTC (off-peak to reduce network timeout risk)
    - cron: "15 3 * * 0"
  workflow_dispatch:
    inputs:
      release:
        description: "Release number within the current week"
        required: false
        default: "1"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Build database
        id: build
        run: |
          EXTRA_ARGS=""
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ inputs.release }}" ]; then
            EXTRA_ARGS="--release ${{ inputs.release }}"
          fi

          uv run aeromux-db $EXTRA_ARGS > build_summary.txt

          # Parse all summary values
          while IFS='=' read -r key value; do
            echo "${key,,}=$value" >> "$GITHUB_OUTPUT"
          done < build_summary.txt

          # Add filename for the download URL
          OUTPUT_FILE=$(grep "^OUTPUT_FILE=" build_summary.txt | cut -d= -f2-)
          echo "filename=$(basename "$OUTPUT_FILE")" >> "$GITHUB_OUTPUT"

      - name: Check for existing release
        id: check
        run: |
          if gh release view "${{ steps.build.outputs.db_version }}" > /dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Release ${{ steps.build.outputs.db_version }} already exists, skipping."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create release
        if: steps.check.outputs.exists == 'false'
        run: |
          REPO="${{ github.repository }}"
          VERSION="${{ steps.build.outputs.db_version }}"
          FILENAME="${{ steps.build.outputs.filename }}"
          DOWNLOAD_URL="https://github.com/${REPO}/releases/download/${VERSION}/${FILENAME}"
          API_URL="https://api.github.com/repos/${REPO}/releases/latest"

          cat > release_notes.md << EOF
          ## Download

          [\`${FILENAME}\`](${DOWNLOAD_URL}) (${{ steps.build.outputs.file_size }})

          ## Database Records

          | Category | Count |
          |----------|------:|
          | Aircraft | ${{ steps.build.outputs.aircraft_count }} |
          | Types | ${{ steps.build.outputs.types_count }} |
          | Operators | ${{ steps.build.outputs.operators_count }} |
          | Manufacturers | ${{ steps.build.outputs.opensky_manufacturers_count }} |
          | Aircraft details | ${{ steps.build.outputs.adsbx_details_count }} |
          | Aircraft fallback | ${{ steps.build.outputs.adsbx_fallback_count }} |
          | OpenSky enriched | ${{ steps.build.outputs.opensky_enrichment_count }} |
          | Type-longnames | ${{ steps.build.outputs.typelongnames_aircraft_count }} |

          ## Programmatic Access

          \`\`\`bash
          # Check latest version
          curl -s ${API_URL} | jq -r '.tag_name'

          # Download latest database
          curl -sL ${API_URL} \\
            | jq -r '.assets[0].browser_download_url' \\
            | xargs curl -sLO
          \`\`\`
          EOF

          gh release create "${VERSION}" \
            "${{ steps.build.outputs.output_file }}" \
            --title "aeromux-db ${VERSION}" \
            --notes-file release_notes.md
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Clean up old releases
        run: |
          gh release list --limit 100 --json tagName --jq '.[].tagName' \
            | tail -n +11 \
            | while read -r tag; do
                echo "Deleting old release: $tag"
                gh release delete "$tag" --yes --cleanup-tag
              done
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
